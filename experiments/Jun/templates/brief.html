<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brief — {{ date }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #fafafa;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            border: none;
            padding: 0;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .meta {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 8px;
            border-left: 4px solid var(--highlight);
        }
        .meta blockquote {
            margin: 0;
        }
        h2 {
            font-size: 1.25rem;
            color: var(--primary);
            margin-top: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--highlight);
        }
        h3 {
            font-size: 1.1rem;
            color: var(--accent);
            margin-top: 1.5rem;
        }
        .source-link {
            color: var(--highlight);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .source-link:hover {
            text-decoration: underline;
        }
        ul {
            padding-left: 1.5rem;
            margin-top: 1rem;
        }
        li {
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            color: var(--text-light);
            font-size: 0.875rem;
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Daily Brief — {{ date }}</h1>
    </header>
    <main>
        {{ content | safe }}
    </main>
    <footer>
        <a href="/">← 返回首页</a>
    </footer>
</body>
</html>

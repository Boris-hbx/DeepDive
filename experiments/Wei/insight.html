<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洞察工作台 — DeepDive</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --ink: #18181b; --muted: #71717a; --border: #e4e4e7;
  --bg: #ffffff; --bg-2: #fafafa; --accent: #2563eb;
  --danger: #ef4444; --success: #10b981; --warn: #f59e0b;
  --user-bubble: #2563eb; --ai-bubble: #f4f4f5;
}
@media (prefers-color-scheme: dark) {
  :root {
    --ink: #fafafa; --muted: #a1a1aa; --border: #27272a;
    --bg: #09090b; --bg-2: #18181b; --accent: #60a5fa;
    --danger: #f87171; --success: #34d399; --warn: #fbbf24;
    --user-bubble: #1d4ed8; --ai-bubble: #27272a;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; }
.workbench { display: grid; grid-template-columns: 38fr 62fr; height: 100vh; }

/* Left panel */
.left { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.left-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.left-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
.left-header .back { font-size: 0.8rem; color: var(--accent); text-decoration: none; }
.left-header .stage-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; background: var(--bg-2); color: var(--muted); border: 1px solid var(--border); }

/* Chat messages */
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
.chat-msg { display: flex; flex-direction: column; max-width: 88%; }
.chat-msg.user { align-self: flex-end; align-items: flex-end; }
.chat-msg.ai { align-self: flex-start; align-items: flex-start; }
.chat-bubble { padding: 0.6rem 0.9rem; border-radius: 12px; font-size: 0.875rem; line-height: 1.55; word-break: break-word; }
.chat-msg.user .chat-bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 3px; }
.chat-msg.ai .chat-bubble { background: var(--ai-bubble); color: var(--ink); border-bottom-left-radius: 3px; }
.chat-msg.ai.thinking .chat-bubble { opacity: 0.6; font-style: italic; }
.chat-time { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; padding: 0 0.2rem; }

/* Chat input */
.chat-input-area { border-top: 1px solid var(--border); padding: 0.75rem 1rem; flex-shrink: 0; }
.chat-input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
.chat-input-row textarea {
  flex: 1; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--ink); font-size: 0.875rem; resize: none;
  min-height: 40px; max-height: 120px; font-family: inherit; line-height: 1.5;
}
.chat-input-row textarea:focus { outline: none; border-color: var(--accent); }
.chat-input-row button {
  padding: 0.55rem 1rem; background: var(--accent); color: white; border: none;
  border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; flex-shrink: 0;
  height: 40px;
}
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
.chat-input-row button:hover:not(:disabled) { opacity: 0.9; }
.chat-hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; }
.chat-options { padding: 0 0 0.4rem 0; }
.deep-toggle { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--muted); cursor: pointer; user-select: none; }
.deep-toggle input { display: none; }
.deep-toggle-mark {
  width: 32px; height: 18px; border-radius: 10px; background: var(--border);
  position: relative; transition: background 0.2s; flex-shrink: 0;
}
.deep-toggle-mark::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%; background: white;
  transition: transform 0.2s;
}
.deep-toggle input:checked + .deep-toggle-mark { background: var(--accent); }
.deep-toggle input:checked + .deep-toggle-mark::after { transform: translateX(14px); }
.deep-toggle-desc { font-size: 0.65rem; opacity: 0.65; }
#deep-v3-toggle-label input:checked + .deep-toggle-mark { background: #7c3aed; }
/* V3 task tree */
.v3-tree-container { padding: 0.75rem; }
.v3-tree-node { padding: 0.3rem 0.5rem; margin: 0.2rem 0; border-left: 2px solid var(--border); }
.v3-node-l1 { border-left-color: var(--accent); font-weight: 600; }
.v3-node-l2 { border-left-color: #7c3aed; }
.v3-node-l3 { border-left-color: var(--muted); font-size: 0.85rem; }
.v3-node-id { font-size: 0.7rem; color: var(--muted); margin-right: 0.3rem; }
.v3-node-title { color: var(--text); }
.v3-node-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
.v3-confirm-bar { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
.v3-btn-confirm { padding: 0.4rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
.v3-btn-auto { padding: 0.4rem 1rem; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
.v3-btn-auto:hover { border-color: var(--accent); color: var(--accent); }
/* V3 task list (brainstorm) */
.v3-tasklist { padding: 0.75rem; }
.v3-task-item { padding: 0.5rem 0.75rem; margin: 0.3rem 0; background: var(--bg-2); border-radius: 6px; border-left: 3px solid var(--accent); }
.v3-task-id { font-size: 0.7rem; color: var(--muted); margin-right: 0.3rem; }
.v3-task-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
/* V3 execution progress */
.v3-exec-container { padding: 0.75rem; }
.v3-exec-node { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.35rem 0.5rem; margin: 0.2rem 0; border-radius: 4px; font-size: 0.85rem; }
.v3-exec-spinner { color: var(--accent); font-size: 1rem; animation: spin 1s linear infinite; flex-shrink: 0; }
.v3-exec-done .v3-exec-spinner { color: #22c55e; animation: none; }
.v3-exec-title { color: var(--text); }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
/* Research status banner */
.research-banner {
  padding: 0.6rem 1rem; margin: 0 1rem 0.5rem;
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.78rem; color: var(--muted); display: none;
}
.research-banner .rb-round { color: var(--accent); font-weight: 600; }
.research-banner .rb-gaps { color: var(--warn); }

/* Right panel */
.right { display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.right-header .right-title { font-weight: 600; font-size: 0.9rem; }
.right-header .header-actions { display: flex; align-items: center; gap: 0.5rem; }
.mode-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 10px; background: var(--bg-2); color: var(--muted); border: 1px solid var(--border); }
.right-body { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }

/* Markdown preview */
.markdown-preview { line-height: 1.7; }
.markdown-preview h1 { font-size: 1.5rem; margin: 1.5rem 0 0.75rem; }
.markdown-preview h2 { font-size: 1.2rem; margin: 1.25rem 0 0.5rem; color: var(--accent); }
.markdown-preview h3 { font-size: 1rem; margin: 1rem 0 0.5rem; }
.markdown-preview p { margin: 0.5rem 0; }
.markdown-preview ul, .markdown-preview ol { margin: 0.5rem 0; padding-left: 1.5rem; }
.markdown-preview table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
.markdown-preview th, .markdown-preview td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
.markdown-preview th { background: var(--bg-2); }
.markdown-preview code { font-size: 0.85rem; background: var(--bg-2); padding: 0.1rem 0.3rem; border-radius: 3px; }
.markdown-preview pre { background: var(--bg-2); padding: 1rem; border-radius: 6px; overflow-x: auto; }
.markdown-preview pre code { background: none; padding: 0; }
.markdown-preview a { color: var(--accent); }
.markdown-preview blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); margin: 0.75rem 0; }

/* Outline preview */
.outline-preview-section { margin-bottom: 0.75rem; }
.outline-h1 { font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 0.25rem; }
.outline-h2 { font-size: 0.95rem; font-weight: 500; color: var(--muted); margin-left: 1rem; margin-bottom: 0.2rem; }
.outline-h3 { font-size: 0.85rem; color: var(--muted); margin-left: 2rem; margin-bottom: 0.15rem; }
.outline-kp { display: inline-flex; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: #dbeafe; color: #1d4ed8; margin: 0.1rem; }
.outline-mat { font-size: 0.7rem; color: var(--muted); margin-left: 0.25rem; }

/* Save button */
.btn-save-report { display: none; padding: 0.5rem 1.25rem; background: var(--success); color: white; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
.btn-save-report:hover { opacity: 0.9; }
.btn-toggle-edit { font-size: 0.75rem; padding: 0.25rem 0.6rem; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--muted); cursor: pointer; display: none; }
.markdown-editor { width: 100%; min-height: 400px; font-family: monospace; font-size: 0.85rem; padding: 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink); resize: vertical; }

/* Status toast */
.status-toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.75rem 1.25rem; border-radius: 8px; background: var(--bg-2); border: 1px solid var(--border); font-size: 0.85rem; z-index: 100; display: none; }
.status-toast.error { border-color: var(--danger); color: var(--danger); }

/* Typing indicator */
.typing-dots { display: inline-flex; gap: 3px; align-items: center; padding: 0.4rem 0.6rem; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
</style>
</head>
<body>
<div class="workbench">
  <!-- Left: Chat -->
  <div class="left">
    <div class="left-header">
      <a href="/" class="back">&larr; 首页</a>
      <h2>洞察工作台</h2>
      <span class="stage-badge" id="stage-badge">准备中</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg ai">
        <div class="chat-bubble">你好！请描述你想探索的洞察课题，以及相关背景（例如：你的角色、关注的具体问题、已有的认知）。</div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="输入洞察主题、背景或指令..." rows="2"></textarea>
        <button id="btn-send">发送</button>
      </div>
      <div class="chat-options">
        <label class="deep-toggle" id="deep-toggle-label">
          <input type="checkbox" id="chk-deep" />
          <span class="deep-toggle-mark"></span>
          <span>深度研究</span>
          <span class="deep-toggle-desc">多轮搜索 + 迭代深入</span>
        </label>
        <label class="deep-toggle" id="deep-v3-toggle-label" style="margin-left:1rem">
          <input type="checkbox" id="chk-deep-v3" />
          <span class="deep-toggle-mark"></span>
          <span>深度研究 v3</span>
          <span class="deep-toggle-desc">任务分解 + 逐级确认</span>
        </label>
      </div>
      <div class="chat-hint" id="chat-hint">发送后 AI 将进行初步分析，右侧实时更新</div>
    </div>
  </div>

  <!-- Right: Preview -->
  <div class="right">
    <div class="right-header">
      <span class="right-title" id="right-title">预览区</span>
      <div class="header-actions">
        <span class="mode-badge" id="mode-badge">等待输入</span>
        <button class="btn-toggle-edit" id="btn-toggle-edit">编辑 Markdown</button>
        <button class="btn-save-report" id="btn-save">保存报告</button>
      </div>
    </div>
    <div class="right-body" id="right-body">
      <p style="color:var(--muted);text-align:center;margin-top:5rem;font-size:0.9rem">在左侧 Chat 中描述你的洞察课题，<br>分析结果将在此实时显示。</p>
    </div>
  </div>
</div>

<div class="status-toast" id="toast"></div>

<script>
// === State ===
let sessionId = null;
let currentMarkdown = '';
let currentOutline = [];
let viewingMarkdown = true;
let sending = false;
let currentTopic = '';
let isDeepResearch = false;

// === DOM refs ===
const $chatMessages = document.getElementById('chat-messages');
const $chatInput = document.getElementById('chat-input');
const $btnSend = document.getElementById('btn-send');
const $rightBody = document.getElementById('right-body');
const $rightTitle = document.getElementById('right-title');
const $modeBadge = document.getElementById('mode-badge');
const $stageBadge = document.getElementById('stage-badge');
const $chatHint = document.getElementById('chat-hint');
const $toast = document.getElementById('toast');
const $btnSave = document.getElementById('btn-save');
const $btnToggleEdit = document.getElementById('btn-toggle-edit');
const $chkDeep = document.getElementById('chk-deep');
const $chkDeepV3 = document.getElementById('chk-deep-v3');
let deepResearchStarted = false;
let deepResearchDone = false;
let analysisDoc = '';

// === Deep Research V3 state ===
let isDeepResearchV3 = false;
let v3SessionId = null;
let v3Stage = 'idle'; // idle | brainstorming | awaiting_l1 | awaiting_l2 | awaiting_l3 | executing | done
let v3TaskTree = [];
let v3ConfirmMode = 'manual';

// === Utils ===
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, isError) {
  $toast.textContent = msg;
  $toast.className = 'status-toast' + (isError ? ' error' : '');
  $toast.style.display = 'block';
  setTimeout(() => { $toast.style.display = 'none'; }, 4000);
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// === Chat UI ===
function appendUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = `<div class="chat-bubble">${escHtml(text)}</div><div class="chat-time">${now()}</div>`;
  $chatMessages.appendChild(div);
  scrollChat();
  return div;
}

function appendAiMsg(text, isThinking) {
  const div = document.createElement('div');
  div.className = 'chat-msg ai' + (isThinking ? ' thinking' : '');
  div.innerHTML = `<div class="chat-bubble">${escHtml(text)}</div><div class="chat-time">${now()}</div>`;
  $chatMessages.appendChild(div);
  scrollChat();
  return div;
}

function showTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'chat-msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="chat-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  $chatMessages.appendChild(div);
  scrollChat();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollChat() {
  $chatMessages.scrollTop = $chatMessages.scrollHeight;
}

function setStageBadge(text) {
  $stageBadge.textContent = text;
}

function setHint(text) {
  $chatHint.textContent = text;
}

// === Right panel renderers ===
function renderAnalysis(markdown) {
  $rightTitle.textContent = '分析文档';
  $modeBadge.textContent = 'Brainstorm';
  $rightBody.innerHTML = '<div class="markdown-preview" id="analysis-preview">' + marked.parse(markdown) + '</div>';
}

function renderOutlinePreview(outline) {
  $rightTitle.textContent = '洞察概要';
  $modeBadge.textContent = '概要确认';
  let html = '';
  function renderNode(node) {
    const cls = node.level === 1 ? 'outline-h1' : node.level === 2 ? 'outline-h2' : 'outline-h3';
    const ml = (node.level - 1) * 1;
    html += `<div class="outline-preview-section" style="margin-left:${ml}rem">`;
    html += `<div class="${cls}">${escHtml(node.title)}</div>`;
    if (node.keyPoints && node.keyPoints.length) {
      html += '<div style="margin-top:0.2rem">' + node.keyPoints.map(k => `<span class="outline-kp">${escHtml(k)}</span>`).join('') + '</div>';
    }
    if (node.materials && node.materials.length) {
      html += '<div style="margin-top:0.15rem">' + node.materials.map(m => `<span class="outline-mat">· ${escHtml(m)}</span>`).join('') + '</div>';
    }
    html += '</div>';
    if (node.children) node.children.forEach(renderNode);
  }
  outline.forEach(renderNode);
  $rightBody.innerHTML = html;
}

function renderReport(markdown) {
  $rightTitle.textContent = '报告正文';
  $modeBadge.textContent = '生成中';
  if (!document.getElementById('md-preview')) {
    $rightBody.innerHTML = '<div class="markdown-preview" id="md-preview"></div>';
  }
  document.getElementById('md-preview').innerHTML = marked.parse(markdown);
  $rightBody.scrollTop = $rightBody.scrollHeight;
}

function finalizeReport() {
  $modeBadge.textContent = '完成';
  $btnSave.style.display = 'inline-block';
  $btnToggleEdit.style.display = 'inline-block';
}

// === Deep Research V3 UI helpers ===
function renderV3TaskTree(tree, awaitingLevel) {
  $rightTitle.textContent = '任务树';
  $modeBadge.textContent = `v3 — L${awaitingLevel} 确认`;

  function nodeHtml(node, depth) {
    const indent = depth * 1.2;
    const levelClass = `v3-node-l${node.level || depth + 1}`;
    let html = `<div class="v3-tree-node ${levelClass}" style="margin-left:${indent}rem">`;
    html += `<span class="v3-node-id">[${node.id}]</span> <span class="v3-node-title">${escHtml(node.title)}</span>`;
    if (node.description) html += `<div class="v3-node-desc">${escHtml(node.description)}</div>`;
    html += '</div>';
    if (node.children && node.children.length > 0) {
      for (const child of node.children) html += nodeHtml(child, depth + 1);
    }
    return html;
  }

  let treeHtml = '<div class="v3-tree-container">';
  for (const node of tree) treeHtml += nodeHtml(node, 0);
  treeHtml += '</div>';

  const confirmBtns = `
    <div class="v3-confirm-bar">
      <button class="v3-btn-confirm" id="btn-v3-confirm-level">确认 L${awaitingLevel}，继续分解</button>
      <button class="v3-btn-auto" id="btn-v3-auto-all">全部自动（跳过后续确认）</button>
    </div>`;

  $rightBody.innerHTML = treeHtml + confirmBtns;

  document.getElementById('btn-v3-confirm-level').addEventListener('click', () => {
    sendV3Confirm(awaitingLevel, false);
  });
  document.getElementById('btn-v3-auto-all').addEventListener('click', () => {
    v3ConfirmMode = 'auto';
    sendV3Confirm(awaitingLevel, true);
  });
}

function renderV3ExecutionProgress(nodeId, title, round) {
  const container = document.getElementById('v3-exec-progress') || (() => {
    const el = document.createElement('div');
    el.id = 'v3-exec-progress';
    el.className = 'v3-exec-container';
    $rightBody.innerHTML = '';
    $rightBody.appendChild(el);
    return el;
  })();

  let nodeEl = document.getElementById(`v3-node-${nodeId}`);
  if (!nodeEl) {
    nodeEl = document.createElement('div');
    nodeEl.id = `v3-node-${nodeId}`;
    nodeEl.className = 'v3-exec-node';
    nodeEl.innerHTML = `<span class="v3-exec-spinner">⟳</span> <span class="v3-exec-title">${escHtml(title)}</span>`;
    container.appendChild(nodeEl);
  } else {
    nodeEl.querySelector('.v3-exec-spinner').textContent = round > 1 ? '⟳²' : '⟳';
  }
}

function markV3NodeDone(nodeId) {
  const nodeEl = document.getElementById(`v3-node-${nodeId}`);
  if (nodeEl) {
    nodeEl.querySelector('.v3-exec-spinner').textContent = '✓';
    nodeEl.classList.add('v3-exec-done');
  }
}

// SSE helper: read a fetch response as SSE and call onEvent(type, data) for each event
async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let eventType = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (line.startsWith('event: ')) {
        eventType = line.slice(7).trim();
      } else if (line.startsWith('data: ')) {
        let data;
        try { data = JSON.parse(line.slice(6)); } catch (_) { continue; }
        onEvent(eventType, data);
        eventType = '';
      }
    }
  }
}

// V3 brainstorm turn
async function sendV3BrainstormTurn(text) {
  const body = { message: text };
  if (v3SessionId) {
    body.sessionId = v3SessionId;
  } else {
    body.topic = currentTopic || text.slice(0, 100);
    body.domain = 'software-engineering';
  }

  const resp = await fetch('/api/insight/deep-research-v3/brainstorm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const d = await resp.json().catch(() => ({}));
    throw new Error(d.error || resp.statusText);
  }

  let typingRemoved = false;
  await readSSE(resp, (type, data) => {
    if (type === 'session') {
      v3SessionId = data.sessionId;
    } else if (type === 'progress') {
      if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
      setHint(data.detail || '');
      setStageBadge('v3 Brainstorm');
    } else if (type === 'brainstorm_tasklist') {
      if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
      renderV3BrainstormTaskList(data.tasks, data.confirmed);
    } else if (type === 'reply') {
      if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
      appendAiMsg(data.text);
    } else if (type === 'brainstorm_done') {
      if (data.confirmed) {
        v3Stage = 'planning';
        setHint('任务清单已确认，点击"开始分解"启动任务树规划');
        injectV3PlanButton();
      } else {
        setHint('可继续补充，或发送"确认"开始任务分解');
      }
    } else if (type === 'error') {
      if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
      appendAiMsg('v3 Brainstorm 出错：' + (data.message || '未知错误'));
      showToast(data.message || '未知错误', true);
    }
  });
  if (!typingRemoved) removeTypingIndicator();
}

function renderV3BrainstormTaskList(tasks, confirmed) {
  $rightTitle.textContent = '分析任务清单';
  $modeBadge.textContent = confirmed ? 'v3 — 已确认' : 'v3 Brainstorm';

  let html = '<div class="v3-tasklist">';
  for (const t of tasks) {
    html += `<div class="v3-task-item"><span class="v3-task-id">[${escHtml(t.id)}]</span> <strong>${escHtml(t.title)}</strong><div class="v3-task-desc">${escHtml(t.description)}</div></div>`;
  }
  html += '</div>';

  if (confirmed) {
    html += `<div class="v3-confirm-bar"><button class="v3-btn-confirm" id="btn-v3-start-plan">开始任务分解</button></div>`;
  }

  $rightBody.innerHTML = html;

  if (confirmed) {
    document.getElementById('btn-v3-start-plan').addEventListener('click', () => {
      sendV3Plan();
    });
  }
}

function injectV3PlanButton() {
  const existing = document.getElementById('btn-v3-start-plan');
  if (existing) return;
  const bar = document.createElement('div');
  bar.className = 'v3-confirm-bar';
  bar.innerHTML = '<button class="v3-btn-confirm" id="btn-v3-start-plan">开始任务分解</button>';
  $rightBody.appendChild(bar);
  document.getElementById('btn-v3-start-plan').addEventListener('click', () => sendV3Plan());
}

// V3 plan phase
async function sendV3Plan() {
  if (!v3SessionId) return;
  v3Stage = 'planning';
  setStageBadge('v3 规划中');
  setHint('正在分解任务树...');
  appendAiMsg('开始任务树分解...');
  showTypingIndicator();

  const resp = await fetch('/api/insight/deep-research-v3/plan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: v3SessionId }),
  });

  if (!resp.ok) {
    removeTypingIndicator();
    const d = await resp.json().catch(() => ({}));
    appendAiMsg('规划失败：' + (d.error || resp.statusText));
    return;
  }

  let typingRemoved = false;
  await readSSE(resp, (type, data) => {
    if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
    if (type === 'progress') {
      setStageBadge('v3 ' + (data.stage || '规划'));
      setHint(data.detail || '');
    } else if (type === 'plan_l1') {
      v3TaskTree = data.nodes;
    } else if (type === 'plan_l2') {
      v3TaskTree = data.tree;
    } else if (type === 'plan_l3') {
      v3TaskTree = data.tree;
    } else if (type === 'awaiting_confirm') {
      v3Stage = `awaiting_l${data.level}`;
      v3TaskTree = data.tree || data.nodes || v3TaskTree;
      renderV3TaskTree(v3TaskTree, data.level);
      setHint(`L${data.level} 任务树已生成，请确认后继续`);
      appendAiMsg(`L${data.level} 分解完成，请在右侧确认任务树。`);
    } else if (type === 'plan_done') {
      if (data.stage === 'ready_to_execute') {
        v3Stage = 'ready_to_execute';
        setHint('任务树构建完毕，点击"开始执行"启动研究');
        appendAiMsg('任务树构建完毕，可点击右侧"确认 L3，继续分解"按钮开始执行研究。');
      }
    } else if (type === 'error') {
      appendAiMsg('规划出错：' + (data.message || '未知错误'));
      showToast(data.message || '未知错误', true);
    }
  });
  if (!typingRemoved) removeTypingIndicator();
}

// V3 confirm a level and proceed
async function sendV3Confirm(level, autoAll) {
  if (!v3SessionId) return;
  setStageBadge('v3 确认中');
  setHint('正在处理确认...');

  const resp = await fetch('/api/insight/deep-research-v3/confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: v3SessionId, level, taskTree: v3TaskTree, autoAll }),
  });

  if (!resp.ok) {
    const d = await resp.json().catch(() => ({}));
    appendAiMsg('确认失败：' + (d.error || resp.statusText));
    return;
  }

  let typingRemoved = false;
  let reportChunks = '';

  await readSSE(resp, (type, data) => {
    if (type === 'progress') {
      setStageBadge('v3 ' + (data.stage || ''));
      setHint(data.detail || '');
    } else if (type === 'plan_l2') {
      v3TaskTree = data.tree;
    } else if (type === 'plan_l3') {
      v3TaskTree = data.tree;
    } else if (type === 'awaiting_confirm') {
      v3Stage = `awaiting_l${data.level}`;
      v3TaskTree = data.tree || data.nodes || v3TaskTree;
      renderV3TaskTree(v3TaskTree, data.level);
      setHint(`L${data.level} 任务树已生成，请确认后继续`);
      appendAiMsg(`L${data.level} 分解完成，请在右侧确认任务树。`);
    } else if (type === 'task_start') {
      if (!typingRemoved) { typingRemoved = true; }
      renderV3ExecutionProgress(data.nodeId, data.title, 1);
      setStageBadge('v3 执行中');
    } else if (type === 'task_done') {
      markV3NodeDone(data.nodeId);
    } else if (type === 'l1_summary') {
      appendAiMsg(`[${data.nodeId}] 小结：${data.summary}`);
    } else if (type === 'content') {
      reportChunks += data.chunk;
      currentMarkdown = reportChunks;
      renderReport(currentMarkdown);
      setStageBadge('v3 生成中');
    } else if (type === 'done') {
      if (data.type === 'report') {
        currentMarkdown = data.markdown || currentMarkdown;
        v3Stage = 'done';
        finalizeReport();
        setStageBadge('v3 完成');
        setHint('深度研究 v3 报告已生成，可保存或继续对话修改');
        appendAiMsg('深度研究 v3 报告已生成，可点击右上角"保存报告"。');
      }
    } else if (type === 'error') {
      appendAiMsg('执行出错：' + (data.message || '未知错误'));
      showToast(data.message || '未知错误', true);
    }
  });
}

// === Deep Research SSE handler ===
async function sendDeepResearch(text) {
  try {
    const resp = await fetch('/api/insight/deep-research', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: text, analysisDoc }),
    });

    if (!resp.ok) {
      const d = await resp.json().catch(() => ({}));
      removeTypingIndicator();
      appendAiMsg('深度研究请求失败：' + (d.error || resp.statusText));
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let reportChunks = '';
    let typingRemoved = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const dataStr = line.slice(6);
          let data;
          try { data = JSON.parse(dataStr); } catch (_) { continue; }

          if (eventType === 'session') {
            sessionId = data.sessionId;

          } else if (eventType === 'plan') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            const sq = data.subQuestions || [];
            const planMsg = '已拆解为以下研究方向：\n' + sq.map((q, i) => `${i + 1}. ${q.question}`).join('\n');
            appendAiMsg(planMsg);
            setStageBadge('规划中');

          } else if (eventType === 'progress') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            const rLabel = data.round ? ` (R${data.round})` : '';
            setStageBadge(data.stage + rLabel);
            setHint(data.detail || '');

          } else if (eventType === 'search_results') {
            setHint(`第 ${data.round} 轮发现 ${(data.items || []).length} 条新内容`);

          } else if (eventType === 'reflect') {
            const gapCount = (data.gaps || []).length;
            const reflectMsg = gapCount === 0
              ? `第 ${data.round} 轮反思：信息充分 — ${data.summary || '开始综合'}`
              : `第 ${data.round} 轮反思：发现 ${gapCount} 个信息缺口 — ${data.summary || ''}`;
            appendAiMsg(reflectMsg);

          } else if (eventType === 'content') {
            reportChunks += data.chunk;
            currentMarkdown = reportChunks;
            renderReport(currentMarkdown);
            setStageBadge('生成中');

          } else if (eventType === 'done') {
            currentMarkdown = data.markdown || currentMarkdown;
            deepResearchDone = true;
            finalizeReport();
            setStageBadge('完成');
            setHint('深度研究报告已生成，可继续对话修改内容');

          } else if (eventType === 'error') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            appendAiMsg('深度研究出错：' + (data.message || '未知错误'));
            showToast(data.message || '未知错误', true);
          }
          eventType = '';
        }
      }
    }

    if (!typingRemoved) removeTypingIndicator();

  } catch (err) {
    removeTypingIndicator();
    appendAiMsg('深度研究请求失败：' + err.message);
    showToast(err.message, true);
  }
}

// === Send message ===
async function sendMessage() {
  const text = $chatInput.value.trim();
  if (!text || sending) return;

  sending = true;
  $btnSend.disabled = true;
  $chatInput.value = '';
  $chatInput.style.height = 'auto';

  if (!currentTopic) currentTopic = text.slice(0, 100);

  appendUserMsg(text);
  showTypingIndicator();

  // === V3 deep research path ===
  if (isDeepResearchV3) {
    try {
      if (v3Stage === 'idle' || v3Stage === 'brainstorming') {
        v3Stage = 'brainstorming';
        await sendV3BrainstormTurn(text);
      } else if (v3Stage === 'planning' || v3Stage.startsWith('awaiting_')) {
        // User typed a message during plan confirmation — treat as brainstorm continuation
        await sendV3BrainstormTurn(text);
      } else {
        // Post-report: fall through to normal chat for modification
        // (no-op here, handled below)
        removeTypingIndicator();
        appendAiMsg('报告已生成，可继续对话修改内容。');
      }
    } catch (err) {
      removeTypingIndicator();
      appendAiMsg('v3 请求失败：' + err.message);
      showToast(err.message, true);
    } finally {
      sending = false;
      $btnSend.disabled = false;
      $chatInput.focus();
    }
    return;
  }

  if (isDeepResearch && deepResearchStarted && !deepResearchDone) {
    // Mid-research message — send via chat
    // fall through to chat path below
  } else if (isDeepResearch && deepResearchStarted && deepResearchDone) {
    // Post-report modification — send via chat (modify_report intent)
    // fall through to chat path below
  } else if (isDeepResearch && !deepResearchStarted) {
    // Check if this is a trigger to start deep research
    const startTriggers = ['开始深度研究', '启动深度研究', '开始研究', 'start research'];
    if (startTriggers.some(t => text.toLowerCase().includes(t.toLowerCase()))) {
      deepResearchStarted = true;
      sending = false;
      $btnSend.disabled = false;
      await sendDeepResearch(currentTopic);
      $chatInput.focus();
      return;
    }
    // Otherwise: first message in deep research mode — brainstorm first via chat
    // fall through to chat path below
  }

  try {
    const body = { message: text };
    if (sessionId) body.sessionId = sessionId;

    const resp = await fetch('/api/insight/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const d = await resp.json().catch(() => ({}));
      removeTypingIndicator();
      appendAiMsg('请求失败：' + (d.error || resp.statusText));
      return;
    }

    // Read SSE stream from response body
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let aiReplyText = '';
    let reportChunks = '';
    let typingRemoved = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const dataStr = line.slice(6);
          let data;
          try { data = JSON.parse(dataStr); } catch (_) { continue; }

          if (eventType === 'session') {
            sessionId = data.sessionId;

          } else if (eventType === 'analysis_update') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            analysisDoc = data.markdown || '';
            renderAnalysis(data.markdown);
            setStageBadge('Brainstorm');
            if (isDeepResearch && !deepResearchStarted) {
              setHint('目标已对齐。确认后点击"开始深度研究"按钮启动多轮搜索');
              // Inject deep research start button into analysis preview
              setTimeout(() => {
                const preview = document.getElementById('analysis-preview');
                if (preview && !document.getElementById('btn-start-deep')) {
                  const btnDiv = document.createElement('div');
                  btnDiv.id = 'dr-btn-container';
                  btnDiv.style.cssText = 'margin-top:1rem;padding:0.75rem;background:var(--bg-2);border:1px dashed var(--accent);border-radius:8px;text-align:center';
                  btnDiv.innerHTML = '<button id="btn-start-deep" style="padding:0.5rem 2rem;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:600">开始深度研究</button>'
                    + '<div style="margin-top:0.3rem;font-size:0.7rem;color:var(--muted)">基于以上分析进行多轮搜索与迭代研究</div>';
                  preview.appendChild(btnDiv);
                  document.getElementById('btn-start-deep').addEventListener('click', () => {
                    deepResearchStarted = true;
                    const btnContainer = document.getElementById('dr-btn-container');
                    if (btnContainer) btnContainer.innerHTML = '<div style="color:var(--accent);font-weight:500">正在启动深度研究...</div>';
                    appendUserMsg('开始深度研究');
                    showTypingIndicator();
                    sendDeepResearch(currentTopic);
                  });
                }
              }, 100);
            } else {
              setHint('可继续补充背景，或发送"生成概要"');
            }

          } else if (eventType === 'outline_update') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            currentOutline = data.outline;
            renderOutlinePreview(data.outline);
            setStageBadge('概要');
            setHint('可修改概要，或发送"生成报告"');

          } else if (eventType === 'content') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            reportChunks += data.chunk;
            currentMarkdown = reportChunks;
            renderReport(currentMarkdown);
            setStageBadge('生成中');

          } else if (eventType === 'reply') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            aiReplyText = data.text;

          } else if (eventType === 'done') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            if (data.type === 'report') {
              currentMarkdown = data.markdown || currentMarkdown;
              finalizeReport();
              setStageBadge('完成');
              if (isDeepResearch) {
                deepResearchDone = true;
                setHint('深度研究报告已生成，可继续对话修改内容');
                if (!aiReplyText) aiReplyText = '深度研究报告已生成，可继续对话修改内容。';
              } else {
                setHint('报告已生成，可保存或继续对话');
                if (!aiReplyText) aiReplyText = '报告正文已生成，可点击右上角"保存报告"。';
              }
            } else if (data.type === 'modify') {
              currentMarkdown = data.markdown || currentMarkdown;
              renderReport(currentMarkdown);
              setStageBadge('已修改');
              setHint('报告已按指令更新，可继续修改');
              if (!aiReplyText) aiReplyText = '报告已更新。';
            }
            if (aiReplyText) appendAiMsg(aiReplyText);
            aiReplyText = '';

          } else if (eventType === 'error') {
            if (!typingRemoved) { removeTypingIndicator(); typingRemoved = true; }
            appendAiMsg('出错了：' + (data.message || '未知错误'));
            showToast(data.message || '未知错误', true);
          }
          eventType = '';
        }
      }
    }

    if (!typingRemoved) removeTypingIndicator();

  } catch (err) {
    removeTypingIndicator();
    appendAiMsg('请求失败：' + err.message);
    showToast(err.message, true);
  } finally {
    sending = false;
    $btnSend.disabled = false;
    $chatInput.focus();
  }
}

// === Event listeners ===
$chkDeep.addEventListener('change', function() {
  isDeepResearch = this.checked;
  if (this.checked && $chkDeepV3.checked) { $chkDeepV3.checked = false; isDeepResearchV3 = false; }
  if (isDeepResearch) {
    $chatHint.textContent = '先进行 Brainstorm 对齐目标，确认后再启动深度研究';
    $modeBadge.textContent = '深度研究';
    $modeBadge.style.borderColor = 'var(--accent)';
    deepResearchStarted = false;
    deepResearchDone = false;
    analysisDoc = '';
    // Remove any leftover start button
    const oldBtn = document.getElementById('dr-btn-container');
    if (oldBtn) oldBtn.remove();
  } else {
    $chatHint.textContent = '发送后 AI 将进行初步分析，右侧实时更新';
    $modeBadge.textContent = 'Brainstorm';
    $modeBadge.style.borderColor = '';
    deepResearchStarted = false;
    deepResearchDone = false;
  }
});

$chkDeepV3.addEventListener('change', function() {
  isDeepResearchV3 = this.checked;
  if (this.checked && $chkDeep.checked) { $chkDeep.checked = false; isDeepResearch = false; }
  if (isDeepResearchV3) {
    $chatHint.textContent = '先 Brainstorm 明确分析任务，发送"确认"后系统自动分解任务树';
    $modeBadge.textContent = '深度研究 v3';
    $modeBadge.style.borderColor = '#7c3aed';
    v3SessionId = null;
    v3Stage = 'idle';
    v3TaskTree = [];
    v3ConfirmMode = 'manual';
  } else {
    $chatHint.textContent = '发送后 AI 将进行初步分析，右侧实时更新';
    $modeBadge.textContent = 'Brainstorm';
    $modeBadge.style.borderColor = '';
    v3Stage = 'idle';
  }
});

$btnSend.addEventListener('click', sendMessage);

$chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// === Save report ===
$btnSave.addEventListener('click', async () => {
  if (!sessionId) return;
  $btnSave.disabled = true;

  try {
    const r = await fetch('/api/insight/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, title: currentTopic }),
    });
    const data = await r.json();
    if (!r.ok) { showToast(data.error || '保存失败', true); $btnSave.disabled = false; return; }
    showToast('报告已保存！', false);
    setTimeout(() => { window.location.href = data.url; }, 1000);
  } catch (err) {
    showToast('请求失败: ' + err.message, true);
    $btnSave.disabled = false;
  }
});

// === Toggle edit/preview ===
$btnToggleEdit.addEventListener('click', () => {
  viewingMarkdown = !viewingMarkdown;
  $btnToggleEdit.textContent = viewingMarkdown ? '编辑 Markdown' : '预览';
  if (viewingMarkdown) {
    $rightBody.innerHTML = '<div class="markdown-preview" id="md-preview">' + marked.parse(currentMarkdown) + '</div>';
  } else {
    $rightBody.innerHTML = '<textarea class="markdown-editor" id="md-editor">' + escHtml(currentMarkdown) + '</textarea>';
    document.getElementById('md-editor').addEventListener('input', function() { currentMarkdown = this.value; });
  }
});

// Ctrl+S to save
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if ($btnSave.style.display !== 'none') $btnSave.click();
  }
});
